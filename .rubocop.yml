require:
  - rubocop-performance
  - rubocop-rspec

inherit_mode:
  merge:
    - Include

AllCops:
  Include:
    - "**/Gemfile"

  CacheRootDirectory: tmp/cache/rubocop_cache/
  TargetRubyVersion: 3.3.4
  DefaultFormatter: fuubar
  NewCops: enable

Layout/EndOfLine:
  EnforcedStyle: lf

Layout/LineLength:
  Max: 120

Layout/MultilineMethodCallIndentation:
  EnforcedStyle: indented
  IndentationWidth: 2

Lint/AmbiguousBlockAssociation:
  Exclude:
    - "spec/**/*"

Metrics/BlockLength:
  Enabled: false

Performance/MethodObjectAsBlock:
  Enabled: false

RSpec/MultipleMemoizedHelpers:
  Max: 10

RSpec/MultipleExpectations:
  Enabled: false

RSpec/ExampleLength:
  Enabled: false

Style/Documentation:
  Enabled: false

Style/FrozenStringLiteralComment:
  Enabled: false

Style/ModuleFunction:
  Enabled: false
